<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - Thomann Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">?? Thomann Clone</a>
            <div class="d-flex">
                <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                <a href="#" class="btn btn-warning">?? Carrello (0)</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Crea un Account</h3>
                        
                        <div id="messaggio-alert"></div>

                        <form id="formRegistrazione">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="nome" required>
                            </div>
                            <div class="mb-3">
                                <label for="cognome" class="form-label">Cognome</label>
                                <input type="text" class="form-control" id="cognome" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Indirizzo Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Registrati</button>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Intercettiamo l'invio del form
        document.getElementById('formRegistrazione').addEventListener('submit', async function(event) {
            // 1. Blocchiamo il caricamento della pagina (comportamento di default dei form HTML)
            event.preventDefault();

            // 2. Raccogliamo i dati inseriti dall'utente
            const nome = document.getElementById('nome').value;
            const cognome = document.getElementById('cognome').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // 3. Creiamo l'oggetto JSON da spedire al backend
            const datiUtente = {
                nome: nome,
                cognome: cognome,
                email: email,
                password: password
            };

            const boxMessaggio = document.getElementById('messaggio-alert');
            boxMessaggio.innerHTML = ''; // Puliamo eventuali messaggi vecchi

            try {
                // 4. Facciamo la chiamata POST alla nostra API
                const risposta = await fetch('../api/register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' // Diciamo al PHP che gli stiamo mandando un JSON
                    },
                    body: JSON.stringify(datiUtente) // Trasformiamo l'oggetto JS in una stringa JSON
                });

                // 5. Leggiamo la risposta del PHP
                const risultato = await risposta.json();

                // 6. Decidiamo cosa mostrare in base all'esito
                if (risposta.ok) { // Se il codice HTTP č 200 o 201 (Tutto bene)
                    boxMessaggio.innerHTML = `<div class="alert alert-success">${risultato.messaggio}</div>`;
                    document.getElementById('formRegistrazione').reset(); // Svuotiamo il form
                } else { // Se il codice HTTP č 400, 409 o 500 (C'č un errore)
                    boxMessaggio.innerHTML = `<div class="alert alert-danger">${risultato.errore}</div>`;
                }

            } catch (errore) {
                console.error("Errore di rete:", errore);
                boxMessaggio.innerHTML = `<div class="alert alert-danger">Errore di connessione al server.</div>`;
            }
        });
    </script>
</body>
</html>
