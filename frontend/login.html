<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Thomann Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">?? Thomann Clone</a>
            <div class="d-flex">
                <a href="registrazione.html" class="btn btn-outline-light me-2">Registrati</a>
                <a href="#" class="btn btn-warning">?? Carrello (0)</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Accedi</h3>
                        
                        <div id="messaggio-alert"></div>

                        <form id="formLogin">
                            <div class="mb-3">
                                <label for="email" class="form-label">Indirizzo Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Entra nel Negozio</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <small>Non hai un account? <a href="registrazione.html">Registrati qui</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const boxMessaggio = document.getElementById('messaggio-alert');
            
            boxMessaggio.innerHTML = ''; // Puliamo i messaggi vecchi

            try {
                const risposta = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const risultato = await risposta.json();

                if (risposta.ok) {
                    // LOGIN RIUSCITO! 
                    // Mostriamo un messaggio verde al volo...
                    boxMessaggio.innerHTML = `<div class="alert alert-success">${risultato.messaggio}</div>`;
                    
                    // ... e dopo 1 secondo reindirizziamo l'utente alla home page
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                    
                } else {
                    // EMAIL O PASSWORD SBAGLIATE
                    boxMessaggio.innerHTML = `<div class="alert alert-danger">${risultato.errore}</div>`;
                }

            } catch (errore) {
                console.error("Errore:", errore);
                boxMessaggio.innerHTML = `<div class="alert alert-danger">Errore di connessione al server.</div>`;
            }
        });
    </script>
</body>
</html>
